{% extends 'base.html' %}
{% block title %}Reminders{% endblock %}
{% block content %}
<div class="card p-3">
  <h3>Reminders</h3>

  <form id="reminder-form" class="row g-2">
    <div class="col-md-6">
      <input name="task" class="form-control" placeholder="Reminder text" required>
    </div>
    <div class="col-md-3">
      <input name="date" type="date" class="form-control" required>
    </div>
    <div class="col-md-2">
      <input name="time" type="time" class="form-control" required>
    </div>
    <div class="col-md-1">
      <button class="btn btn-dark-green w-100" type="submit">Save</button>
    </div>
  </form>

  <h5 class="mt-3">Alerts</h5>
  <div id="alerts" style="height:160px; overflow-y:auto; background:#1c1c1c; padding:10px; border-radius:8px; border:1px solid #444; color:white;">
    <p style="color:#bbb">No alerts yet...</p>
  </div>
</div>

<script>
document.getElementById("reminder-form").addEventListener("submit", function(e){
  e.preventDefault();
  fetch("/add_reminder", { method: "POST", body: new FormData(this) })
    .then(r => r.json())
    .then(data => {
      if(data.status === "success"){
        alert("Reminder saved");
        this.reset();
      } else {
        alert("Error saving reminder");
      }
    });
});

// Poll for present & future reminders every 30 seconds
setInterval(function(){
  fetch("/check_reminder")
    .then(r => r.json())
    .then(list => {
      const box = document.getElementById("alerts");
      box.innerHTML = ""; // show the current list
      if(list.length === 0){
        box.innerHTML = "<p style='color:#bbb'>No alerts yet...</p>";
      } else {
        list.forEach(item => {
          const p = document.createElement("p");
          p.textContent = item;
          box.appendChild(p);
        });
      }
    });
}, 30000);

// Also run once on page load
fetch("/check_reminder")
  .then(r => r.json())
  .then(list => {
    const box = document.getElementById("alerts");
    box.innerHTML = "";
    if(list.length === 0){
      box.innerHTML = "<p style='color:#bbb'>No alerts yet...</p>";
    } else {
      list.forEach(item => { const p = document.createElement("p"); p.textContent = item; box.appendChild(p); });
    }
  });
</script>
{% endblock %}
