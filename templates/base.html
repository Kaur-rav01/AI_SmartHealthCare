
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}AI Smart HealthCare{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #000; color: #fff; padding-top: 70px; }
    .btn-dark-green{ background-color:#064420; color:white; border:none; }
    .btn-dark-green:hover{ background-color: #0b7d3f; }
    .form-control, .form-select { background:#1c1c1c; color:white; border:1px solid #444; }
    .card { background:#0b0b0b; border:1px solid #222; color:#eee; }
    .nav-link.active { background-color: #0b7d3f; color: #fff !important; border-radius:6px; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <div class="container">
    <a class="navbar-brand" href="/">AI Smart HealthCare</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link {% if active_page=='home' %}active{% endif %}" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page=='heart' %}active{% endif %}" href="/heart">Heart</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page=='diabetes' %}active{% endif %}" href="/diabetes">Diabetes</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page=='chest' %}active{% endif %}" href="/chest">Chest X-Ray</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page=='chatbot' %}active{% endif %}" href="/chatbot">Chatbot</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page=='reminder' %}active{% endif %}" href="/reminder">Reminders</a></li>
        <li class="nav-item"><a class="nav-link {% if active_page=='reports' %}active{% endif %}" href="/reports">Reports</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container">
  {% with messages = get_flashed_messages() %}
    {% if messages %}
      <div class="alert alert-info">{{ messages[0] }}</div>
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
